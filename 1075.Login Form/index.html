<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <!--=============== REMIXICONS ===============-->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">

   <!--=============== CSS ===============-->
   <link rel="stylesheet" href="./css/styles.css">

   <title>Responsive login form with gsap </title>
</head>
<body>
   <section class="login">
      <div class="login__content">
         <div>
            <h2 class="login__title">Welcome back 👋</h2>

            <form action="" method="post" class="login__form">
               <div class="login__group">
                  <div class="login__box">
                     <i class="ri-mail-fill login__icon"></i>
                     <input type="email" name="email" autocomplete="email" required placeholder=" " class="login__input"
                        id="email">
                     <label for="email" class="login__label">Email</label>
                  </div>

                  <div class="login__box">
                     <i class="ri-lock-2-fill login__icon"></i>
                     <input type="password" name="password" autocomplete="current-password" required placeholder=" "
                        class="login__input" id="password">
                     <label for="password" class="login__label">Password</label>
                  </div>
               </div>

               <a href="#" class="login__forgot">Forgot Password?</a>

               <button type="submit" class="login__button">
                  Log In <i class="ri-send-plane-2-fill"></i>
               </button>

               <p class="login__sign">
                  Don't have an account? <a href="#">Sign Up</a>
               </p>
            </form>
         </div>

         <div class="login__image">
            <img src="./img/login-bg.png" alt="" class="login__img">
         </div>
      </div>
   </section>

   <!--=============== GSAP ===============-->
   <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>

   <!--=============== MAIN JS ===============-->
   <script src="./js/main.js"></script>
</body>
</html>
