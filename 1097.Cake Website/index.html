<!DOCTYPE html>
<html lang="en">
<head>

      content="Discover delicious custom cakes made with premium ingredients. Order handmade cakes for birthdays, weddings and special occasions. Fresh, beautiful and crafted with love.">
   <meta name="robots" content="index, follow">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <!--=============== FAVICON ===============-->
   <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">

   <!--=============== REMIXICONS - Insert link for icons ===============-->
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css">

   <!--=============== SWIPER CSS - Insert link for swiperjs ===============-->
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">

   <!--=============== CSS ===============-->
   <link rel="stylesheet" href="./css/styles.css">

<body>

            <a href="#" class="nav__logo">
               <img src="./img/logo.svg" alt="img">

            </a>
            <div class="nav__menu" id="nav-menu">
               <ul class="nav__list">
                  <li><a href="#home" class="nav__link">Home</a></li>
                  <li><a href="#about" class="nav__link">About Us</a></li>
                  <li><a href="#product" class="nav__link">Products</a></li>
                  <li><a href="#new" class="nav__link">New</a></li>
                  <li><a href="#contact" class="nav__link">Contact</a></li>
               </ul>

               <button class="nav__close" id="nav-close" aria-label="Close menu">
                  <i class="ri-close-large-line"></i>
               </button>
               <img src="./img/leaf-3.png" alt="img" class="nav__img">
            </div>
            <!-- Toggle -->
            <button class="nav__toggle" id="nav-toggle" aria-label="Toggle menu">

            </button>

   <!--==================== FOOTER ====================-->

   <!--========== SCROLL UP ==========-->

   <!--=============== SWIPER JS - Insert link for swiperjs ===============-->
   <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

   <script src="./js/main.js"></script>
