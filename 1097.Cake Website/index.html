<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="description"
      content="Discover delicious custom cakes made with premium ingredients. Order handmade cakes for birthdays, weddings and special occasions. Fresh, beautiful and crafted with love.">
   <meta name="robots" content="index, follow">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <!--=============== FAVICON ===============-->
   <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">

   <!--=============== REMIXICONS - Insert link for icons ===============-->
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css">

   <!--=============== SWIPER CSS - Insert link for swiperjs ===============-->
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">

   <!--=============== CSS ===============-->
   <link rel="stylesheet" href="./css/styles.css">

   <title>Custom Cakes Bakery | Fresh Handmade Cakes for Every Occasion </title>
</head>
<body>
   <!--==================== HEADER & NAV ====================-->
   <header class="header" id="header">
      <nav class="nav container">
         <a href="#" class="nav__logo">
            <img src="./img/logo.svg" alt="img">
            <span>Delizia</span>
         </a>
         <div class="nav__menu" id="nav-menu">
            <ul class="nav__list">
               <li><a href="#home" class="nav__link">Home</a></li>
               <li><a href="#about" class="nav__link">About Us</a></li>
               <li><a href="#product" class="nav__link">Products</a></li>
               <li><a href="#new" class="nav__link">New</a></li>
               <li><a href="#contact" class="nav__link">Contact</a></li>
            </ul>
            <!-- Close -->
            <button class="nav__close" id="nav-close" aria-label="Close menu">
               <i class="ri-close-large-line"></i>
            </button>
            <img src="./img/leaf-3.png" alt="img" class="nav__img">
         </div>
         <!-- Toggle -->
         <button class="nav__toggle" id="nav-toggle" aria-label="Toggle menu">
            <i class="ri-apps-2-line"></i>
         </button>
      </nav>
   </header>

   <!--==================== MAIN ====================-->
   <main class="main">
      <!--==================== HOME SECTION ====================-->
      <section class="home section" id="home">
         <div class="home__container container grid">
            <div class="home__data">
               <h1 class="home__title">
                  Best Custom <span>Cakes Bakery</span>
               </h1>
               <p class="home__description">
                  We create handcrafted cakes made with love, premium ingredients,
                  and a touch of magic. Because life's sweetest moments deserve to be
                  celebrated in a special way.
               </p>
               <a href="#new" class="button">Explore Our Cakes</a>
               <img src="./img/home-slice-cake-1.png" alt="img" class="home__slice-1">
               <img src="./img/home-slice-cake-2.png" alt="img" class="home__slice-2">
               <img src="./img/home-balloons.png" alt="img" class="home__balloons">
               <img src="./img/sticker-4.svg" alt="img" class="home__sticker-1">
               <img src="./img/sticker-3.svg" alt="img" class="home__sticker-2">
            </div>
            <div class="home__images">
               <img src="./img/home-blob.svg" alt="img" class="home__blob">
               <img src="./img/home-base.png" alt="img" class="home__base">
               <img src="./img/leaf-1.png" alt="img" class="home__leaf-1">
               <img src="./img/leaf-3.png" alt="img" class="home__leaf-2">
               <img src="./img/sticker-1.svg" alt="img" class="home__sticker-3">
               <img src="./img/sticker-2.svg" alt="img" class="home__sticker-4">

               <div class="home__swiper swiper">
                  <div class="swiper-wrapper">
                     <article class="home__article swiper-slide">
                        <img src="./img/home-cake-1.png" alt="img" class="home__cake">
                     </article>
                     <article class="home__article swiper-slide">
                        <img src="./img/home-cake-2.png" alt="img" class="home__cake">
                     </article>
                     <article class="home__article swiper-slide">
                        <img src="./img/home-cake-3.png" alt="img" class="home__cake">
                     </article>
                     <article class="home__article swiper-slide">
                        <img src="./img/home-cake-4.png" alt="img" class="home__cake">
                     </article>
                  </div>
               </div>
            </div>
         </div>
      </section>

      <!--==================== ABOUT SECTION ====================-->
      <section class="about section" id="about">

      </section>

      <!--==================== PRODUCTS SECTION ====================-->
      <section class="product section" id="product">

      </section>

      <!--==================== NEW SECTION ====================-->
      <section class="new section" id="new">

      </section>

      <!--==================== CONTACT SECTION ====================-->
      <section class="contact section" id="contact">

      </section>
   </main>

   <!--==================== FOOTER ====================-->
   <footer class="footer">

   </footer>

   <!--========== SCROLL UP ==========-->


   <!--=============== SCROLLREVEAL - Insert link for animations ===============-->
   <script src="https://cdnjs.cloudflare.com/ajax/libs/scrollReveal.js/4.0.9/scrollreveal.min.js"></script>

   <!--=============== SWIPER JS - Insert link for swiperjs ===============-->
   <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

   <!--=============== MAIN JS ===============-->
   <script src="./js/main.js"></script>
</body>
</html>
