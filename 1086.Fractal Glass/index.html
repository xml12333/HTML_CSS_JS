<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="description"
      content="Futuristic AI landing page inspired by fractal glass design. A sleek, modern interface that reflects intelligence, transparency, and next-generation artificial intelligence technology.">
   <meta name="robots" content="index, follow">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <!--=============== FAVICON ===============-->
   <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">

   <!--=============== REMIXICONS ===============-->
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css">

   <!--=============== CSS ===============-->
   <link rel="stylesheet" href="./css/styles.css">

   <title>Fractal Glass AI Landing Page | Bedimcode</title>
</head>
<body>
   <!--==================== HEADER ====================-->
   <header class="header" id="header">
      <nan class="nav container">
         <a href="#" class="nav__logo">
            <i class="ri-ai-generate-3d-line"></i> <span>Toolbox</span>
         </a>
         <div class="nav__menu" id="nav-menu">
            <ul class="nav__list">
               <li><a href="#" class="nav__link">Home</a></li>
               <li><a href="#" class="nav__link">Tools</a></li>
               <li><a href="#" class="nav__link">Prices</a></li>
               <li><a href="#" class="nav__link">Special</a></li>
               <li><a href="#" class="nav__link">Contact</a></li>
            </ul>
            <!-- Close -->
            <button class="nav__close" id="nav-close" arial-label="Close menu">
               <i class="ri-close-large-line"></i>
            </button>
         </div>
         <!-- Toggle -->
         <button class="nav__toggle" id="nav-toggle" aria-label="Toggle menu">
            <i class="ri-menu-fill"></i>
         </button>
      </nan>
   </header>

   <!--==================== MAIN ====================-->
   <main class="main">
      <!--==================== HOME ====================-->
      <section class="home">
         <img src="./img/ellipse-gradients.png" alt="img" class="home__bg">
         <div class="home__boxes">
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
            <div class="home__box"></div>
         </div>
         <div class="home__container container">
            <div class="home__data">
               <i class="ri-ai-generate-3d-line home__icon"></i>
               <h1 class="home__title">Build with the <br> AI Smart Toolbox</h1>
               <p class="home__description">Create and connect intelligent IA tools to boost the work
                  of developers and businesses, connecting multiple AI
                  configurations and accelerating workflow between users.</p>
            </div>
            <div class="home__buttons">
               <a href="#" class="home__button">Apply for Beta</a>
               <a href="#" class="home__button home__button-ghost">Learn More</a>
            </div>
         </div>
      </section>
   </main>

   <!--=============== GSAP ===============-->
   <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/SplitText.min.js"></script>

   <!--=============== MAIN JS ===============-->
   <script src="./js/main.js"></script>
</body>
</html>
