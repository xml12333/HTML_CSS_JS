<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <!--=============== REMIXICONS - Insert link for icons ===============-->
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css">

   <!--=============== CSS ===============-->
   <link rel="stylesheet" href="./css/styles.css">

   <title>Responsive expand card</title>
</head>
<body>
   <section class="card">
      <article class="card__article">
         <img src="./img/img-1.png" alt="Beautiful forest landscape" class="card__img">
         <div class="card__shadow"></div>

         <div class="card__data">
            <div class="card__icon">
               <i class="ri-landscape-fill"></i>
            </div>

            <div class="card__info">
               <h2 class="card__title">Majestic Fog</h2>
               <p class="card__description">Beautiful scenery to enjoy.</p>
            </div>
         </div>
      </article>

      <article class="card__article">
         <img src="./img/img-2.png" alt="Beautiful forest landscape" class="card__img">

            <div class="card__icon">

            </div>

            <div class="card__info">
               <h2 class="card__title">Autumn Trees</h2>
               <p class="card__description">Beautiful scenery to enjoy.</p>
            </div>
         </div>
      </article>

      <article class="card__article card__active">
         <img src="./img/img-3.png" alt="Beautiful forest landscape" class="card__img">
         <div class="card__shadow"></div>

         <div class="card__data">
            <div class="card__icon">

      <article class="card__article">

      <article class="card__article">
         <img src="./img/img-5.png" alt="Beautiful forest landscape" class="card__img">
         <div class="card__shadow"></div>

         <div class="card__data">
            <div class="card__icon">
               <i class="ri-landscape-fill"></i>

</html>
